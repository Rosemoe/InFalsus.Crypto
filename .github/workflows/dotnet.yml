name: InFalsus.Crypto Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
  workflow_dispatch: 

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtimeIdentifier:
          [
            win-x64,
            win-x86,
            linux-x64,
            linux-arm,
            linux-arm64,
            osx-x64,
            osx-arm64
          ]

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build InFalsus.Crypto
      run: dotnet publish InFalsus.Crypto/InFalsus.Crypto.csproj --self-contained -p:PublishTrimmed=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:DebugType=none -p:RuntimeIdentifier=${{ matrix.runtimeIdentifier }} --framework net10.0
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: InFalsus.Crypto_${{ matrix.runtimeIdentifier }}
        path: InFalsus.Crypto/bin/Release/net10.0/${{ matrix.runtimeIdentifier }}/publish
